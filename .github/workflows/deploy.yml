name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Jika web berada di dalam subfolder, Anda perlu menambahkan path ini.
      # Karena ini repo untuk web, saya berasumsi path-nya ada di root atau di dalam mod-manager-web
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Uncomment jika Anda mem-push folder ini sebagai repo utama:
          # cache-dependency-path: 'package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        # working-directory: ./mod-manager-web # Hapus komen ini jika repo berada di root dan web di dalam subfolder

      - name: Build
        run: npm run build
        # working-directory: ./mod-manager-web

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload folder dist hasil build
          path: './dist' 
          # path: './mod-manager-web/dist' # Sesuaikan path dist jika dalam subfolder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
